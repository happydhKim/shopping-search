server:
  port: 8081

spring:
  application:
    name: enricher
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/shopping?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:app}
    password: ${MYSQL_PASS:app}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1000

enricher:
  consumer:
    group-id: enricher-v1

logging:
  level:
    root: INFO
    com.kakao.search: DEBUG
