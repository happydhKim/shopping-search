server:
  port: 8082

spring:
  application:
    name: bulk-indexer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}

bulk-indexer:
  consumer:
    group-id: bulk-indexer-v1

es:
  host: ${ES_HOST:http://localhost:9200}
  # data stream 이름. template의 index_patterns(products-*)와 매칭되어야 ILM + mapping이 적용됨.
  index: ${ES_INDEX:products-v1}

logging:
  level:
    root: INFO
    com.kakao.search: DEBUG
