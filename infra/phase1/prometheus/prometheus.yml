# Phase 1 Prometheus 구성
#
# 수집 대상:
#   - elasticsearch_exporter (ES 클러스터/노드/인덱스 metric)
#   - prometheus self-monitoring
#
# scrape_interval:
#   PoC 환경에서는 15s가 적당. 너무 짧으면 ES exporter 부하 ↑
#   실 운영은 30s~60s가 일반적

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: search-poc
    phase: "1"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: elasticsearch
    metrics_path: /metrics
    static_configs:
      - targets: ["es-exporter:9114"]
        labels:
          cluster: search-poc
