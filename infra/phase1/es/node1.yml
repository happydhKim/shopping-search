# node1 — master + data_hot
#
# 역할 분리의 의미:
#   master: 클러스터 상태 관리 (node join/leave, shard 할당 결정)
#   data_hot: 색인/검색 워크로드 처리 (가장 최신, 가장 빈번한 데이터)
#
# 면접 포인트:
#   master + data 동거가 일반적으로 권장되지 않는 이유는,
#   data 노드의 GC pause가 master election에 영향을 줄 수 있기 때문이다.
#   3-node 소규모 PoC에서는 자원 효율을 위해 동거시키지만,
#   Phase 4에서 master를 분리하는 구조로 진화시킨다.

cluster.name: search-poc
node.name: node1
node.roles: [master, data_hot, data_content, ingest]

network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# 디스커버리 — Phase 1은 단일 호스트 docker network 내에서 동작
discovery.seed_hosts: ["es-node1", "es-node2", "es-node3"]
cluster.initial_master_nodes: ["node1", "node2", "node3"]

# Heap 보호 — swap 방지
bootstrap.memory_lock: true

# 단일 호스트 PoC라 보안 비활성 (Phase 4에서 활성화 검토)
xpack.security.enabled: false
xpack.security.transport.ssl.enabled: false

# 모니터링용 stats endpoint를 모두 노출
xpack.monitoring.collection.enabled: true
