# Grafana dashboard auto-provisioning
# /var/lib/grafana/dashboards 디렉토리의 JSON 파일을 자동 로드

apiVersion: 1

providers:
  - name: 'Phase 1 Dashboards'
    orgId: 1
    folder: 'Phase 1'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
