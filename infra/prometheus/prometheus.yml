global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: search-poc
    phase: "2"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: elasticsearch
    metrics_path: /metrics
    static_configs:
      - targets: ["es-exporter:9114"]
        labels:
          cluster: search-poc
