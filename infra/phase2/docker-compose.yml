# Phase 2 — 5-node Hot-Warm-Cold 클러스터 + 모니터링
#
# 설계 의도:
#   - Phase 1(3-node)을 확장하여 데이터 tier 분리 실증
#   - node1, node2: master + data_hot (최신 데이터, 쓰기 대상)
#   - node3: master-only (coordinating 겸용, 데이터 미보관)
#   - node4: data_warm (force-merge 완료 인덱스, 읽기 전용)
#   - node5: data_cold (장기 보관, 저비용)
#
# 리소스 가정: node1~4 × 1G + node3,5 × 512M + 시스템 ≈ 8G RAM 이상

services:
  # ─────────────────────────────────────────
  # Elasticsearch — 5-node cluster (hot/warm/cold)
  # ─────────────────────────────────────────

  es-node1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es-node1
    environment:
      - node.name=node1
      - cluster.name=search-poc
      - discovery.seed_hosts=es-node1,es-node2,es-node3,es-node4,es-node5
      - cluster.initial_master_nodes=node1,node2,node3
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./es/node1.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-node1-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks: [search-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  es-node2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es-node2
    environment:
      - node.name=node2
      - cluster.name=search-poc
      - discovery.seed_hosts=es-node1,es-node2,es-node3,es-node4,es-node5
      - cluster.initial_master_nodes=node1,node2,node3
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./es/node2.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-node2-data:/usr/share/elasticsearch/data
    ports:
      - "9201:9200"
    networks: [search-net]
    depends_on: [es-node1]

  es-node3:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es-node3
    environment:
      - node.name=node3
      - cluster.name=search-poc
      - discovery.seed_hosts=es-node1,es-node2,es-node3,es-node4,es-node5
      - cluster.initial_master_nodes=node1,node2,node3
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./es/node3.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-node3-data:/usr/share/elasticsearch/data
    ports:
      - "9202:9200"
    networks: [search-net]
    depends_on: [es-node1]

  es-node4:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es-node4
    environment:
      - node.name=node4
      - cluster.name=search-poc
      - discovery.seed_hosts=es-node1,es-node2,es-node3,es-node4,es-node5
      - cluster.initial_master_nodes=node1,node2,node3
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./es/node4.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-node4-data:/usr/share/elasticsearch/data
    ports:
      - "9203:9200"
    networks: [search-net]
    depends_on: [es-node1]

  es-node5:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: es-node5
    environment:
      - node.name=node5
      - cluster.name=search-poc
      - discovery.seed_hosts=es-node1,es-node2,es-node3,es-node4,es-node5
      - cluster.initial_master_nodes=node1,node2,node3
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - ./es/node5.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - es-node5-data:/usr/share/elasticsearch/data
    ports:
      - "9204:9200"
    networks: [search-net]
    depends_on: [es-node1]

  # ─────────────────────────────────────────
  # Monitoring — Prometheus + Grafana
  # ─────────────────────────────────────────

  es-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    container_name: es-exporter
    command:
      - '--es.uri=http://es-node1:9200'
      - '--es.all'
      - '--es.indices'
      - '--es.indices_settings'
      - '--es.shards'
      - '--es.cluster_settings'
    ports:
      - "9114:9114"
    networks: [search-net]
    depends_on: [es-node1]

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [search-net]
    depends_on: [es-exporter]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks: [search-net]
    depends_on: [prometheus]

networks:
  search-net:
    driver: bridge

volumes:
  es-node1-data:
  es-node2-data:
  es-node3-data:
  es-node4-data:
  es-node5-data:
  prometheus-data:
  grafana-data:
